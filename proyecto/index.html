<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Tenkaichi</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Staatliches&display=swap" rel="stylesheet">
</head>
<body>
    <section id="mainTitle">
        <h1>Memory Tenkaichi</h1>
        <p>¡Desafía tu memoria en este emocionante juego!</p>
    </section>

    <section id="Game-container">
        <div id="menu-row">
            <section class="menu-card">
                <h2>Selecciona tu modo de juego</h2>
                <div id="mode-options">
                    <button class="mode-btn" data-mode="single">Un jugador</button>
                    <button class="mode-btn" data-mode="multiplayer">Multijugador</button>
                </div>
            </section>

            <section id="menu-Dificultad" class="menu-card">
                <h2>Selecciona tu dificultad</h2>
                <div id="difficulty-options">
                    <button class="difficulty-btn" data-difficulty="easy">Fácil</button>
                    <button class="difficulty-btn" data-difficulty="medium">Medio</button>
                    <button class="difficulty-btn" data-difficulty="hard">Difícil</button>
                </div>
            </section>
        </div>

        <section id="theme-section" class="menu-card">
            <h2 id="theme-title">Selecciona tu tema</h2>
            <div id="opciones-temas">
                <button id="dragon-balls">Esferas del dragón</button>
                <button id="z-fighters">Guerreros Z</button>
                <button id="villains">Villanos</button>
            </div>
        </section>

        <section id="game"></section>
    </section>
    

    <!-- Scripts: core, data, components, app (sin módulos) -->
    <script defer src="js/core/state.js"></script>
    <script defer src="js/core/engine.js"></script>
    <script defer src="js/core/matchmaking.js"></script>
    <script defer src="js/data/themesData.js"></script>

    <script defer src="js/components/themes.js"></script>
    <script defer src="js/components/modes.js"></script>
    <script defer src="js/components/game.js"></script>
    <script defer src="js/components/boardRenderer.js"></script>
    <script defer src="js/components/hud.js"></script>
    <script defer src="js/components/achievements.js"></script>
    <script defer src="js/components/endScreen.js"></script>
    <script defer src="js/components/menu.js"></script>

    <script defer src="js/app.js"></script>
</body>
</html>
