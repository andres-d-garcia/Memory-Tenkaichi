<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Tenkaichi</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Staatliches&display=swap" rel="stylesheet">
</head>
<body>
    <audio id="miAudio" src="/proyecto/assets/sounds/Kusuburu Heart Ni Hi O Tsukero!! - Dragon Ball Z Budokai 2 (Saxophone only version) HQ - Bentyhunter (320k).mp3" preload="auto" autoplay="autoplay" loop="loop"></audio>
    <section id="main-menu">
    <section id="mainTitle">
        <h1>Memory Tenkaichi</h1>
        <p>¡Desafía tu memoria en este emocionante juego!</p>
    </section>
    <section id="Game-container">
        <div id="menu-row">
            <section class="menu-card">
                <h2>Selecciona modo de juego</h2>
                <div id="mode-options" >
                    <button class="mode-btn" data-modo="solitario">Un jugador</button>
                    <button class="mode-btn" data-modo="multijugador">Multijugador</button>
                    <button class="mode-btn" data-modo="practica">Modo Práctica</button>
                </div>
            </section>

            <section id="menu-Dificultad" class="menu-card">
                <h2>Selecciona la dificultad</h2>
                <div id="opciones-dificultad">
                    <button class="difficulty-btn" data-dificultad="facil">Fácil</button>
                    <button class="difficulty-btn" data-dificultad="medio">Medio</button>
                    <button class="difficulty-btn" data-dificultad="dificil">Difícil</button>
                </div>
            </section>
        </div>

        <section id="theme-section" class="menu-card">
            <h2 id="theme-title">Selecciona el tema</h2>
            <div id="opciones-temas">
                <button id="z-fighters" data-theme="z-fighters">Guerreros Z</button>
                <button id="dragon-balls" data-theme="dragon-balls">Miscelaneos</button>
                <button id="villains" data-theme="villains">Villanos</button>
            </div>
        </section>

    </section>
    
    <section id="game">
        <header id="game-hud" class="hidden">
            <div class="hud-item" id="hud-players">Jugador</div>
            <div class="hud-item" id="hud-moves">Movimientos: <span id="moves-count">0</span></div>
            <div class="hud-item" id="hud-timer">Tiempo: <span id="timer-count">00:00</span></div>
            <div class="hud-item" id="hud-score">
                <span id="score-p1" class="active-player">J1: 0</span>  |  <span id="score-p2">J2: 0</span>
            </div>
        </header>
        <button id="play-button">Jugar</button>
        <div id="board-container"></div>
        <button id="exit-button" class="hidden" aria-label="Cerrar">X</button>
    </section>
    </section>

    
    

    <!-- Scripts: core, data, components, app (sin módulos) -->
    <script defer src="js/core/state.js"></script>
    <script defer src="js/core/engine.js"></script>
    <script defer src="js/core/matchmaking.js"></script>
    <script defer src="js/data/themesData.js"></script>

    <script defer src="js/components/themes.js"></script>
    <script defer src="js/components/modes.js"></script>
    <script defer src="js/components/game.js"></script>
    <script defer src="js/components/boardRenderer.js"></script>
    <script defer src="js/components/timer.js"></script>
    <script defer src="js/components/hud.js"></script>
    <script defer src="js/components/achievements.js"></script>
    <script defer src="js/components/endScreen.js"></script>
    <script defer src="js/components/menu.js"></script>

    <script defer src="js/app.js"></script>
</body>
</html>
